services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloth
      POSTGRES_PASSWORD: cloth_password
      POSTGRES_DB: cloth_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloth -d cloth_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cloth_minio
      MINIO_ROOT_PASSWORD: cloth_minio_password
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  migrate:
    build:
      context: ./server
    env_file: ./server/.env
    command: npm run prisma:migrate
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./server
    restart: unless-stopped
    env_file: ./server/.env
    command: npm run start
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "3000:3000"

  worker:
    build:
      context: ./server
    restart: unless-stopped
    env_file: ./server/.env
    command: npm run start:worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
